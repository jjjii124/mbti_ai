<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폐교, 괴담이 시작되는 밤</title>
<style>
  :root{
    --ink: #dbe2db;
    --ink-dim: #8a958c;
    --fluoro: #e8f4e2;
    --blood: #a02525;
    --blood-dim: #5c1414;
    --card-border: #2a2e2b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh; position:relative;
    color:var(--ink);
    font-family:'Noto Serif KR', Georgia, serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    background:#030404;
    overflow-x:hidden;
  }

  /* ---- realistic-ish hallway backdrop ---- */
  .hallway-bg{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 26% 40% at 50% 38%, rgba(255,238,190,0.16), rgba(255,238,190,0) 70%),
      linear-gradient(180deg, #05070a 0%, #0a0d10 40%, #06080a 100%);
    overflow:hidden;
  }
  .hallway-bg svg{ position:absolute; inset:0; width:100%; height:100%; }
  .grain{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0.22; mix-blend-mode:overlay;
  }
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(ellipse 70% 70% at 50% 45%, transparent 40%, rgba(0,0,0,0.75) 100%);
  }

  .stage{ position:relative; z-index:2; width:100%; max-width:540px; }
  .frame{
    position:relative;
    background: rgba(8,9,9,0.42);
    backdrop-filter: blur(5px) brightness(0.85);
    -webkit-backdrop-filter: blur(5px) brightness(0.85);
    border:1px solid var(--card-border);
    border-radius:4px;
    padding:38px 30px 30px;
    box-shadow: 0 40px 90px rgba(0,0,0,0.7);
    overflow:hidden;
  }
  .frame h1, .frame .story, .frame .ending-text, .frame .type-name{
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
  .frame::before{
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
    pointer-events:none; mix-blend-mode:overlay;
  }
  .frame::after{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 50% 0%, rgba(232,244,226,0.045), transparent 55%);
    pointer-events:none; animation: flicker 4.2s steps(1) infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1;} 7%{opacity:0.35;} 8%{opacity:1;} 30%{opacity:0.55;} 31%{opacity:1;}
    68%{opacity:0.3;} 69%{opacity:1;}
  }
  .rec{
    position:absolute; top:13px; right:15px; z-index:2;
    font-family:-apple-system,'Malgun Gothic',sans-serif; font-size:11px;
    letter-spacing:1px; color:var(--blood); display:flex; align-items:center; gap:5px;
  }
  .rec .dot{ width:6px;height:6px;border-radius:50%; background:var(--blood); animation:blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0;} }

  .dots{ display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:22px; max-width:280px; margin-left:auto; margin-right:auto; }
  .dot-step{ width:5px;height:5px;border-radius:50%; background:var(--card-border); }
  .dot-step.active{ background:var(--blood); }
  .dot-step.done{ background:var(--blood-dim); }

  .eyebrow{
    font-family:-apple-system,'Malgun Gothic',sans-serif; font-size:11px; letter-spacing:3px;
    color:var(--ink-dim); text-align:center; margin-bottom:14px; text-transform:uppercase;
  }
  .icon{ display:flex; justify-content:center; margin-bottom:16px; }
  .icon svg{ width:58px; height:58px; opacity:0.9; }

  h1{ font-size:21px; text-align:center; margin:0 0 16px; font-weight:400; line-height:1.5; letter-spacing:0.5px; }
  .story{ font-size:15.5px; line-height:1.9; margin-bottom:26px; min-height:70px; }
  .story em{ color:var(--blood); font-style:normal; }
  .choices{ display:flex; flex-direction:column; gap:11px; }
  button.choice{
    font-family:-apple-system,'Malgun Gothic',sans-serif; text-align:left;
    background:rgba(255,255,255,0.02); border:1px solid var(--card-border); color:var(--ink);
    padding:14px 17px; border-radius:3px; font-size:14px; cursor:pointer; transition:.2s ease; line-height:1.5;
  }
  button.choice:hover{ border-color:var(--blood-dim); background:rgba(160,37,37,0.09); transform:translateX(2px); }
  button.choice:focus-visible{ outline:2px solid var(--blood); outline-offset:2px; }

  .start-btn{
    display:block; margin:8px auto 0; font-family:-apple-system,'Malgun Gothic',sans-serif;
    background:var(--blood); color:#f4ece6; border:none; padding:12px 30px; border-radius:2px;
    font-size:14px; font-weight:600; letter-spacing:0.5px; cursor:pointer; transition:.15s;
  }
  .start-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 22px rgba(160,37,37,0.3); }

  .compass{ display:flex; justify-content:center; gap:10px; margin:2px 0 22px; flex-wrap:wrap; }
  .letter-slot{
    width:40px;height:40px;border:1px solid var(--card-border);border-radius:50%;
    display:flex;align-items:center;justify-content:center; font-family:Georgia,serif; font-size:16px;
    color:var(--blood); background:radial-gradient(circle, rgba(160,37,37,0.16), transparent 70%);
    box-shadow:0 0 14px rgba(160,37,37,0.25);
  }
  .type-title{ text-align:center; font-size:29px; letter-spacing:4px; color:var(--fluoro); margin:2px 0 4px; text-shadow:0 0 12px rgba(232,244,226,0.15); }
  .type-name{ text-align:center; font-size:13.5px; color:var(--ink-dim); font-family:-apple-system,'Malgun Gothic',sans-serif; margin-bottom:20px; letter-spacing:1px; }
  .ending-text{ font-size:15.5px; line-height:1.95; text-align:center; margin-bottom:26px; }
  .restart{
    display:block; margin:0 auto; background:none; border:1px solid var(--card-border); color:var(--ink-dim);
    font-family:-apple-system,'Malgun Gothic',sans-serif; padding:10px 20px; border-radius:2px; font-size:12.5px;
    cursor:pointer; transition:.2s;
  }
  .restart:hover{ color:var(--blood); border-color:var(--blood-dim); }

  @media (max-width:480px){
    .frame{ padding:28px 18px 24px; }
    h1{ font-size:19px; }
    .story, .ending-text{ font-size:14.5px; }
    .type-title{ font-size:24px; }
  }
  @media (prefers-reduced-motion: reduce){
    .frame::after{ animation:none; } .rec .dot{ animation:none; }
  }
</style>
</head>
<body>

<div class="hallway-bg">
  <svg viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#0c0e10"/>
        <stop offset="1" stop-color="#020303"/>
      </linearGradient>
      <linearGradient id="wallL" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#07090a"/>
        <stop offset="1" stop-color="#14171a"/>
      </linearGradient>
      <linearGradient id="wallR" x1="1" y1="0" x2="0" y2="0">
        <stop offset="0" stop-color="#07090a"/>
        <stop offset="1" stop-color="#14171a"/>
      </linearGradient>
      <radialGradient id="doorGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#fdeec2" stop-opacity="0.55"/>
        <stop offset="60%" stop-color="#fdeec2" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#fdeec2" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- perspective corridor -->
    <polygon points="0,800 800,800 460,330 340,330" fill="url(#floor)"/>
    <polygon points="0,0 0,800 340,330 340,190" fill="url(#wallL)"/>
    <polygon points="800,0 800,800 460,330 460,190" fill="url(#wallR)"/>
    <polygon points="340,190 460,190 460,330 340,330" fill="#0a0c0d"/>

    <!-- vanishing door with light bleeding through -->
    <rect x="372" y="220" width="56" height="105" fill="#050505" stroke="#2a2e2b" stroke-width="1"/>
    <circle cx="400" cy="272" r="90" fill="url(#doorGlow)"/>

    <!-- lockers left -->
    <g opacity="0.55">
      <rect x="20" y="430" width="60" height="220" fill="#0e1113" stroke="#1d2224" stroke-width="1"/>
      <rect x="84" y="430" width="60" height="220" fill="#101315" stroke="#1d2224" stroke-width="1"/>
      <rect x="148" y="430" width="60" height="220" fill="#0e1113" stroke="#1d2224" stroke-width="1"/>
      <rect x="212" y="420" width="55" height="200" fill="#101315" stroke="#1d2224" stroke-width="1"/>
    </g>
    <!-- lockers right -->
    <g opacity="0.55">
      <rect x="720" y="430" width="60" height="220" fill="#0e1113" stroke="#1d2224" stroke-width="1"/>
      <rect x="656" y="430" width="60" height="220" fill="#101315" stroke="#1d2224" stroke-width="1"/>
      <rect x="592" y="430" width="60" height="220" fill="#0e1113" stroke="#1d2224" stroke-width="1"/>
      <rect x="533" y="420" width="55" height="200" fill="#101315" stroke="#1d2224" stroke-width="1"/>
    </g>

    <!-- floor perspective lines -->
    <g stroke="#1a1d1f" stroke-width="1" opacity="0.5">
      <line x1="0" y1="800" x2="340" y2="330"/>
      <line x1="800" y1="800" x2="460" y2="330"/>
      <line x1="130" y1="800" x2="380" y2="340"/>
      <line x1="670" y1="800" x2="420" y2="340"/>
    </g>

    <!-- faint distant silhouette -->
    <g opacity="0.5">
      <ellipse cx="400" cy="300" rx="7" ry="9" fill="#050505"/>
      <path d="M393 309 C 391 320 391 330 393 336 L 407 336 C 409 330 409 320 407 309 Z" fill="#050505"/>
    </g>
  </svg>
</div>

<svg class="grain" width="0" height="0">
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div class="grain" style="filter:url(#noiseFilter);"></div>
<div class="vignette"></div>

<div class="stage"><div class="frame" id="frame"></div></div>

<script>

    choices:[ {text:'"누구세요?" 라디오에 대답한다', value:'E'}, {text:'라디오를 끄고 조용히 지나간다', value:'I'} ] },

const endings = {
  ISTJ:{name:'규칙을 끝까지 지킨 자', text:'정해진 순서를 한 치도 어기지 않고 따르자, 등 뒤의 숨소리가 서서히 멀어진다. 정문을 나서면서도 뒤돌아보지 않는다 — 몸이 먼저, 그래야 한다는 걸 알고 있었다.'},
  ISFJ:{name:'등을 내어준 자', text:'다친 후배를 업고 걷는 내내, 무언가 발밑에서 따라오는 소리가 들렸다. 그래도 걸음을 멈추지 않는다. 교문을 나서고서야, 그 소리도 함께 멈췄다는 걸 깨닫는다.'},
  INFJ:{name:'홀로 진실을 본 자', text:'일기장 마지막 장을 읽는 순간, 이 모든 게 누구의 이야기였는지 알아버렸다. 아무에게도 말하지 않은 채 교문을 나서지만, 그날 이후로 가끔 그 필체가 당신 손끝에서 흘러나온다.'},
  INTJ:{name:'동선에서 벗어나지 않은 자', text:'처음 세운 경로에서 단 한 걸음도 벗어나지 않는다. 시계탑이 자정을 알리는 순간, 당신은 이미 운동장 너머에 있다. 뒤에서 종이 열두 번 울렸다는 걸, 다음 날에야 알게 된다.'},
  ISTP:{name:'소리 없이 해결한 자', text:'옥상 문을 조용히 따고 배선을 끊어 사이렌을 멈춘다. 문제는 해결됐지만, 이후로 방송실 스피커는 늘 낮게 지지직거린다. 아무도 그 이유를 모른다.'},
  ISFP:{name:'다정함으로 답한 자', text:'창가에 놓인 화분에 물을 주고 지나간 순간, 등 뒤의 서늘한 기운이 스르르 옅어진다. 왜인지는 모른다. 다만 그 화분은, 다음 날 아무도 심은 적 없는 자리에서 자라고 있었다.'},
  INFP:{name:'이야기를 들어준 자', text:'책상 낙서 속 사연을 끝까지 읽어준 건 당신뿐이었다. 학교는 당신을 순순히 놓아준다. 다만 그날 이후, 같은 낙서가 당신의 방 책상 모서리에서도 발견된다.'},
  INTP:{name:'저주를 반박한 자', text:'논리적 허점을 찾아 저주 같은 건 없었다고 스스로 증명해버린다. 그런데 증명이 끝난 후에도, 칠판의 글씨는 여전히 조금씩 늘어나고 있다.'},
  ESTJ:{name:'모두를 이끈 자', text:'흩어진 친구들을 모아 동선을 지휘한다. 마지막까지 한 명도 놓치지 않는다. 다만 나중에 인원을 세어보니, 처음 셌던 숫자보다 하나가 많았다.'},
  ESFJ:{name:'끝까지 이름을 부른 자', text:'다들 무사한지 이름을 하나하나 확인한다. 그런데 마지막으로 부른 이름에, 아무도 대답하지 않았다. 그래도 당신은 그 이름을 끝까지 부르며 교문을 나선다.'},
  ENFJ:{name:'손을 놓지 않은 자', text:'겁에 질린 손을 잡고 함께 뛴다. 교문 밖에서 숨을 고르고 나서야, 그 손이 처음부터 차가웠다는 걸 깨닫는다.'},
  ENTJ:{name:'한 수 위였던 자', text:'뒤엉킨 상황을 정확히 파악하고 새 동선을 지시한다. 저주보다 한 수 위였던 셈이다. 다만 그 후로, 이 학교 지도에는 없는 복도 하나가 당신의 꿈에 계속 나타난다.'},
  ESTP:{name:'몸으로 먼저 뛴 자', text:'창문 밖으로 뛰어내리는 게 더 빠르다고 판단, 망설임 없이 뛴다. 착지한 순간 뒤를 돌아보니, 방금까지 있던 창문이 사라져 있었다.'},
  ESFP:{name:'그 순간을 놓치지 않은 자', text:'도망치던 와중에도 피아노 소리에 발길을 멈췄다. 짧게 건반을 두드리고 웃으며 뛰쳐나온다. 다만 그 곡은, 아무도 가르쳐준 적 없는 멜로디였다.'},
  ENFP:{name:'다 데려온 자', text:'동선을 몇 번이나 바꾼 끝에, 숨어 있던 다른 친구까지 함께 구했다. 다만 다음 날 출석부에는, 그 친구의 이름이 애초에 없었다.'},
  ENTP:{name:'설정 자체에 반박한 자', text:'이 괴담 자체가 앞뒤가 안 맞는다며 논리적 허점을 찾아 없던 비상구를 만들어낸다. 다만 그 비상구는, 당신이 나온 뒤 다시는 그 자리에서 보이지 않았다.'},
};

let current = -1;
const scores = { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 };
const frame = document.getElementById('frame');
const recBadge = `<div class="rec"><span class="dot"></span>REC</div>`;

function renderIntro(){
  frame.innerHTML = `
    ${recBadge}
    <div class="eyebrow">Found Footage · Interactive</div>
    <div class="icon">${svgIcons.moon}</div>
    <h1>폐교, 괴담이 시작되는 밤</h1>
    <div class="story" style="text-align:center;">
      방과 후 깜빡 잠들었다 깨어난 교실. 창밖은 이미 캄캄하고, 아무도 없어야 할 학교엔 <em>무언가</em>가 함께 있다.<br><br>
      16번의 선택으로, 당신은 이 밤을 어떻게 빠져나갈지 정하게 된다.
    </div>
    <button class="start-btn" onclick="nextScene()">교실 문을 연다</button>
  `;
}

function renderDots(){
  let html = '<div class="dots">';
  for(let i=0;i<scenes.length;i++){
    let cls='dot-step';
    if(i<current) cls+=' done'; else if(i===current) cls+=' active';
    html+=`<div class="${cls}"></div>`;
  }
  return html+'</div>';
}

function renderScene(){
  const s = scenes[current];
  let html = recBadge + renderDots();
  html += `<div class="eyebrow">Scene ${current+1} / ${scenes.length}</div>`;
  html += `<div class="icon">${svgIcons[s.icon]}</div>`;
  html += `<h1>${s.title}</h1>`;
  html += `<div class="story">${s.text}</div>`;
  html += '<div class="choices">';
  s.choices.forEach(c=>{ html+=`<button class="choice" onclick="choose('${c.value}')">${c.text}</button>`; });
  html += '</div>';
  frame.innerHTML = html;
}

function choose(value){ scores[value]+=1; nextScene(); }

function nextScene(){
  current++;
  if(current >= scenes.length) renderEnding(); else renderScene();
}

function renderEnding(){
  const type = (scores.E>=scores.I?'E':'I') + (scores.S>=scores.N?'S':'N') + (scores.T>=scores.F?'T':'F') + (scores.J>=scores.P?'J':'P');
  const ending = endings[type];
  const letters = type.split('');
  let html = recBadge;
  html += `<div class="eyebrow">The Ending</div>`;
  html += `<div class="icon">${svgIcons.shadow}</div>`;
  html += '<div class="compass">';
  letters.forEach(l=>{ html += `<div class="letter-slot">${l}</div>`; });
  html += '</div>';
  html += `<div class="type-title">${type}</div>`;
  html += `<div class="type-name">${ending.name}</div>`;
  html += `<div class="ending-text">${ending.text}</div>`;
  html += `<button class="restart" onclick="restart()">다시 교실로 돌아가기</button>`;
  frame.innerHTML = html;
}

function restart(){
  current=-1;
  for(const k in scores) scores[k]=0;
  renderIntro();
}

renderIntro();
</script>
</body>
</html>
